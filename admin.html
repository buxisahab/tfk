<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Creator Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-storage-compat.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Nexus.</a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="#" id="logout-btn" class="hidden" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div id="loader" class="loader"></div>

        <!-- Auth Panel -->
        <div id="auth-panel" class="glass-card auth-panel hidden">
            <h2 class="article-title" style="text-align: center; font-size: 1.8rem;">Creator Access</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn" style="flex: 1;">Login</button>
                    <button type="button" class="btn" style="flex: 1; background: var(--border-color);" onclick="signup()">Sign Up</button>
                </div>
            </form>
        </div>

        <div id="editor-panel" class="hidden">
            <div id="admin-banner" class="hidden" style="background: var(--accent-color); color: white; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; text-align: center; font-weight: bold;">
                👑 Admin Mode Active: You have full control.
            </div>

            <div class="glass-card" style="margin-bottom: 2rem;">
                <h2 class="article-title" style="margin-bottom: 2rem;">Draft New Article</h2>
                <div class="form-group">
                    <label>Article Title</label>
                    <input type="text" id="article-title" class="form-control" placeholder="The Future of Web Development..." required>
                </div>
                <div class="form-group">
                    <label>Author Name</label>
                    <input type="text" id="article-author" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <div id="editor-container"></div>
                </div>
                <button class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem; margin-top: 1rem;" onclick="publishArticle()">Publish Article</button>
            </div>

            <!-- Manage Articles -->
            <div class="glass-card" id="manage-articles-panel">
                <h2 class="article-title" style="margin-bottom: 1.5rem; font-size: 1.5rem;">Manage Articles</h2>
                <div id="manage-articles-list">
                    <!-- articles injected here -->
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
    <script src="firebase-init.js"></script>
    <script src="admin.js"></script>
</body>
</html>
